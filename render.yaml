services:
  - type: web
    name: mcp-devbridge-api
    runtime: docker
    dockerfilePath: backend/McpDevBridge.Api/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000

  - type: web
    name: mcp-github-server
    runtime: docker
    dockerfilePath: mcp-servers/Dockerfile
    dockerContext: mcp-servers
    plan: free
    envVars:
      - key: PORT
        value: "3001"
      - key: SERVER_TYPE
        value: github
      - key: GITHUB_TOKEN
        sync: false
