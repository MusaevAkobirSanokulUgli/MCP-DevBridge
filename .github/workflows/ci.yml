name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/McpDevBridge.Api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore

  mcp-servers:
    name: MCP Servers Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-servers/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend, mcp-servers]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
